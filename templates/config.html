<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Config — MRCE Smart Timetable</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div id="toast"></div>
<div id="load-overlay"><div class="spinner"></div><span id="load-text" style="color:var(--text);font-family:var(--mono);font-size:13px;letter-spacing:2px">LOADING...</span></div>

<div class="topbar">
  <div class="flex-row">
    <div style="margin-right:16px">
      <div class="brand-sub">HOD DASHBOARD</div>
      <div class="brand-name">MRCE SMART TIMETABLE</div>
    </div>
    <nav class="nav-tabs" id="topbar-tabs"></nav>
  </div>
  <div class="flex-row">
    <span class="dept-badge" id="topbar-badge"></span>
    <span class="dept-name"  id="topbar-dept"></span>
    <a href="/logout" class="btn btn-secondary btn-sm">LOGOUT</a>
  </div>
</div>
<div class="dept-stripe"></div>

<div class="page">
  <div class="flex-row mb-16">
    <span style="color:var(--muted);font-size:11px;font-family:var(--mono);letter-spacing:2px">DEPARTMENT CONFIGURATION</span>
    <div class="ml-auto flex-row">
      <button class="btn btn-secondary" onclick="resetCfg()">↺ RESET</button>
      <button class="btn btn-primary"   onclick="saveCfg()">💾 SAVE &amp; APPLY</button>
    </div>
  </div>

  <!-- YEARS -->
  <div class="config-block">
    <div class="config-block-title">📅 CLASSES / YEARS</div>
    <div id="year-list" class="flex-row mb-12"></div>
    <div class="flex-row">
      <input id="ny-id"  class="form-input" style="width:80px"  type="number" min="1" max="9" placeholder="ID"/>
      <input id="ny-lbl" class="form-input" style="width:160px" placeholder="Label e.g. 5th Year"/>
      <button class="btn btn-success" onclick="addYear()">+ ADD YEAR</button>
    </div>
  </div>

  <!-- SECTIONS PER YEAR -->
  <div class="config-block">
    <div class="config-block-title">🏫 SECTIONS (per year)</div>
    <div id="sec-year-tabs" class="flex-row mb-10"></div>
    <div id="sec-list" class="flex-row mb-10"></div>
    <div class="flex-row">
      <input id="ns-sec" class="form-input" style="width:100px" placeholder="e.g. E"/>
      <button class="btn btn-success" onclick="addSec()">+ ADD SECTION</button>
    </div>
  </div>

  <!-- SUBJECTS -->
  <div class="config-block">
    <div class="config-block-title">📚 SUBJECTS (by year)</div>
    <div id="subj-year-tabs" class="flex-row mb-10"></div>
    <div id="subj-editor"></div>
  </div>

  <div style="color:var(--muted);font-size:11px;font-family:var(--mono);line-height:1.9;margin-top:6px">
    ℹ Importance → periods per week:
    <span style="color:var(--high)">● HIGH = 8</span> &nbsp;
    <span style="color:var(--medium)">● MEDIUM = 6</span> &nbsp;
    <span style="color:var(--low)">● LOW = 4</span><br>
    Saving resets current timetable → regenerate from Dashboard.
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/config.js"></script>
</body>
</html>
